<script>
function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  document.querySelectorAll('.nav-links a').forEach(a => a.classList.remove('active'));
  const navEl = document.getElementById('nav-' + name);
  if (navEl) navEl.classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function openVideoModal() {
  const m = document.getElementById('videoModal');
  m.classList.remove('hidden');
  m.classList.add('flex');
  document.body.style.overflow = 'hidden';
}
function closeVideoModal() {
  const m = document.getElementById('videoModal');
  m.classList.add('hidden');
  m.classList.remove('flex');
  document.body.style.overflow = '';
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeVideoModal();
});

function toggleMobileMenu() {
  const links = document.querySelector('.nav-links');
  if (!links) return;
  links.classList.toggle('is-open');
  links.classList.toggle('fixed', links.classList.contains('is-open'));
  links.classList.toggle('inset-x-0', links.classList.contains('is-open'));
  links.classList.toggle('top-[76px]', links.classList.contains('is-open'));
  links.classList.toggle('z-[999]', links.classList.contains('is-open'));
  links.classList.toggle('flex-col', links.classList.contains('is-open'));
  links.classList.toggle('border-b', links.classList.contains('is-open'));
  links.classList.toggle('border-line', links.classList.contains('is-open'));
  links.classList.toggle('bg-ink/95', links.classList.contains('is-open'));
  links.classList.toggle('backdrop-blur-xl', links.classList.contains('is-open'));
  links.classList.toggle('gap-4', links.classList.contains('is-open'));
  links.classList.toggle('px-6', links.classList.contains('is-open'));
  links.classList.toggle('py-6', links.classList.contains('is-open'));
}

const statEls = document.querySelectorAll('.stat-num[data-target]');
const counterObs = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (!entry.isIntersecting) return;
    const el = entry.target;
    const target = parseInt(el.dataset.target, 10);
    const duration = 1600;
    const steps = 60;
    let step = 0;
    const increment = target / steps;
    const timer = setInterval(() => {
      step++;
      const val = Math.min(Math.round(increment * step), target);
      el.textContent = target > 10 ? val.toLocaleString() + '+' : (step >= steps ? target : val);
      if (step >= steps) {
        el.textContent = target >= 1000 ? '1000+' : (target >= 10 ? '10+' : target.toString());
        clearInterval(timer);
      }
    }, duration / steps);
    counterObs.unobserve(el);
  });
}, { threshold: 0.4 });
statEls.forEach(el => counterObs.observe(el));
</script>
